name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.png'
      - '**/*.ico'
      - '**/*.icns'
      - '**/*.svg'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.png'
      - '**/*.ico'
      - '**/*.icns'
      - '**/*.svg'
      - 'LICENSE'
      - '.gitignore'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Compute which areas actually changed (robust git-diff, not substring matching)
  # so the expensive build jobs only run when their sources moved.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so push-event diffs resolve reliably
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'core/**'
              - 'server/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            frontend:
              - 'tauri-app/frontend/**'
              - '.github/workflows/ci.yml'

  build-and-test:
    name: Build & Test (Workspace)
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test -p omni-me-core -p omni-me-server

      - name: Build release
        run: cargo build --release -p omni-me-core -p omni-me-server

  build-frontend:
    name: Build Frontend (WASM)
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-app/frontend
          cache-bin: false

      - name: Install dioxus-cli
        uses: cargo-bins/cargo-binstall@main
      - name: Binstall dx
        run: cargo binstall dioxus-cli --no-confirm --force

      - name: Build frontend
        working-directory: tauri-app/frontend
        run: dx build --platform web --release
