name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test (Workspace)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test -p omni-me-core -p omni-me-server

      - name: Build release
        run: cargo build --release -p omni-me-core -p omni-me-server

  build-frontend:
    name: Build Frontend (WASM)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-app/frontend

      - name: Install dioxus-cli
        uses: cargo-bins/cargo-binstall@main
      - name: Binstall dx
        run: cargo binstall dioxus-cli --no-confirm

      - name: Build frontend
        working-directory: tauri-app/frontend
        run: |
          export PATH="$CARGO_HOME/bin:$PATH"
          dx build --platform web --release
